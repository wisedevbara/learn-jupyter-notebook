# =============================================================================
# CATATAN PENTING
# =============================================================================
#
# 1. BUAT SLACK WEBHOOK:
#    a. Buka https://api.slack.com/messaging/webhooks
#    b. Klik "Create New App" → From scratch
#    c. Beri nama, pilih workspace
#    d. Klik "Incoming Webhooks" → Activate
#    e. Klik "Add New Webhook to Workspace"
#    f. Pilih channel → Copy URL
#
# 2. TAMBAHKAN SECRETS DI GITHUB:
#    Repository → Settings → Secrets and variables → Actions → New repository secret
#
#    Secrets yang diperlukan:
#    - Name: SLACK_WEBHOOK_URL
#      Value: (URL webhook dari langkah 1)
#
#    Secrets opsional:
#    - Name: SLACK_CHANNEL
#      Value: (nama channel, misal: #deployments)
#
# 3. JENIS NOTIFIKASI YANG BISA DIKIRIM:
#    - Workflow started
#    - Workflow completed
#    - Deployment success
#    - Deployment failure
#    - Test results
#    - Security scan results
#    - Custom messages
#
# 4. FORMAT BLOCKS (SLACK):
#    Menggunakan Slack Block Kit untuk pesan yang lebih menarik:
#    - Headers
#    - Sections dengan fields
#    - Buttons dengan actions
#    - Dividers
#    - dll
#
# =============================================================================
