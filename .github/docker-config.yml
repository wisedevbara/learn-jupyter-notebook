# =============================================================================
# CATATAN PENTING
# =============================================================================
#
# 1. TAMBAHKAN SECRETS DI GITHUB:
#    Repository → Settings → Secrets and variables → Actions → New repository secret
#
#    Secrets yang diperlukan:
#    - Name: DOCKER_USERNAME
#      Value: (your Docker Hub username)
#
#    - Name: DOCKER_PASSWORD  
#      Value: (your Docker Hub password OR access token)
#
# 2. DOCKER HUB ACCESS TOKEN (DISARANKAN):
#    Lebih aman menggunakan access token daripada password langsung:
#    - Buka: https://hub.docker.com/settings/security
#    - Klik: New Access Token
#    - Copy token dan gunakan sebagai DOCKER_PASSWORD
#
# 3. VISIBILITY:
#    Pastikan repository Docker Hub Anda sesuai:
#    - Public: Siapa pun bisa pull
#    - Private: Hanya Anda yang bisa pull (harus login)
#
# =============================================================================
